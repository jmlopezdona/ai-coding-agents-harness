site_name: Harness Engineering
site_description: Guía en español sobre cómo construir software a escala con AI coding agents
site_author: jmlopezdona
site_url: https://jmlopezdona.github.io/ai-coding-agents-harness/
repo_url: https://github.com/jmlopezdona/ai-coding-agents-harness
repo_name: jmlopezdona/ai-coding-agents-harness
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Overview: 00-harness-engineering.md
  - Perspective:
      - "1. Why the harness matters more than the model": 01-why-harness.md
      - "2. Relocating rigor": 02-relocating-rigor.md
  - Pillars:
      - "3. Guides and Sensors: feedforward and feedback": 03-guides-and-sensors.md
      - "4. The loop: iteration as primitive": 04-the-loop.md
  - Hands-on:
      - "5. Isolated and reproducible environments": 05-isolated-environments.md
      - "6. Context as a system of record": 06-context-system-of-record.md
      - "7. Architecture for agents": 07-architecture-for-agents.md
      - "8. The agentic PR flow": 08-agentic-pr-flow.md
  - Long-term:
      - "9. Entropy and continuous maintenance": 09-entropy-and-maintenance.md
      - "10. Where humans still matter": 10-human-role.md
  - Pitfalls:
      - "11. Anti-patterns": 11-anti-patterns.md
  - Apply it:
      - "12. Diagnosis and maturity": 12-diagnosis-and-maturity.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Enlace permanente a esta sección
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - en
        - es
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          site_name: Harness Engineering
          nav_translations:
            "Home": "Inicio"
            "Overview": "Resumen"
            "Perspective": "Visión"
            "1. Why the harness matters more than the model": "1. Por qué el harness importa más que el modelo"
            "2. Relocating rigor": "2. La reubicación del rigor"
            "Pillars": "Pilares"
            "3. Guides and Sensors: feedforward and feedback": "3. Guías y Sensores: feedforward y feedback"
            "4. The loop: iteration as primitive": "4. El bucle: iteración como primitiva"
            "Hands-on": "Manos a la obra"
            "5. Isolated and reproducible environments": "5. Entornos aislados y reproducibles"
            "6. Context as a system of record": "6. El contexto como sistema de registro"
            "7. Architecture for agents": "7. Arquitectura para agentes"
            "8. The agentic PR flow": "8. El flujo de PR agéntico"
            "Long-term": "A largo plazo"
            "9. Entropy and continuous maintenance": "9. Entropía y mantenimiento continuo"
            "10. Where humans still matter": "10. Dónde sigue importando el humano"
            "Pitfalls": "Errores comunes"
            "11. Anti-patterns": "11. Anti-patrones"
            "Apply it": "Aplícalo"
            "12. Diagnosis and maturity": "12. Diagnóstico y madurez"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jmlopezdona/ai-coding-agents-harness
