site_name: Harness Engineering
site_description: Guía en español sobre cómo construir software a escala con AI coding agents
site_author: jmlopezdona
site_url: https://jmlopezdona.github.io/ai-coding-agents-harness/
repo_url: https://github.com/jmlopezdona/ai-coding-agents-harness
repo_name: jmlopezdona/ai-coding-agents-harness
edit_uri: edit/main/docs/

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

nav:
  - Inicio: index.md
  - Empieza aquí: 00-harness-engineering.md
  - Mentalidad:
      - "1. Por qué el harness importa más que el modelo": 01-why-harness.md
      - "2. La reubicación del rigor": 02-relocating-rigor.md
  - Pilares:
      - "3. Guías y Sensores: feedforward y feedback": 03-guides-and-sensors.md
      - "4. El bucle: iteración como primitiva": 04-the-loop.md
  - Práctica:
      - "5. Entornos aislados y reproducibles": 05-isolated-environments.md
      - "6. El contexto como sistema de registro": 06-context-system-of-record.md
      - "7. Arquitectura para agentes": 07-architecture-for-agents.md
      - "8. El flujo de PR agéntico": 08-agentic-pr-flow.md
  - Sostenibilidad:
      - "9. Entropía y mantenimiento continuo": 09-entropy-and-maintenance.md
      - "10. Dónde sigue importando el humano": 10-human-role.md
  - Trampas:
      - "11. Anti-patrones": 11-anti-patterns.md
  - Tu equipo:
      - "12. Diagnóstico y madurez": 12-diagnosis-and-maturity.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Enlace permanente a esta sección
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - es
        - en
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: es
          default: true
          name: Español
          build: true
        - locale: en
          name: English
          build: true
          site_name: Harness Engineering
          nav_translations:
            "Inicio": "Home"
            "Empieza aquí": "Start here"
            "Mentalidad": "Mindset"
            "1. Por qué el harness importa más que el modelo": "1. Why the harness matters more than the model"
            "2. La reubicación del rigor": "2. Relocating rigor"
            "Pilares": "Pillars"
            "3. Guías y Sensores: feedforward y feedback": "3. Guides and Sensors: feedforward and feedback"
            "4. El bucle: iteración como primitiva": "4. The loop: iteration as primitive"
            "Práctica": "Practice"
            "5. Entornos aislados y reproducibles": "5. Isolated and reproducible environments"
            "6. El contexto como sistema de registro": "6. Context as a system of record"
            "7. Arquitectura para agentes": "7. Architecture for agents"
            "8. El flujo de PR agéntico": "8. The agentic PR flow"
            "Sostenibilidad": "Sustainability"
            "9. Entropía y mantenimiento continuo": "9. Entropy and continuous maintenance"
            "10. Dónde sigue importando el humano": "10. Where humans still matter"
            "Trampas": "Pitfalls"
            "11. Anti-patrones": "11. Anti-patterns"
            "Tu equipo": "Your team"
            "12. Diagnóstico y madurez": "12. Diagnosis and maturity"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jmlopezdona/ai-coding-agents-harness
